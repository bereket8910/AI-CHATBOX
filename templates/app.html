<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #111827;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #334155;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #1e293b;
        }

        .message {
            max-width: 75%;
            padding: 12px 14px;
            border-radius: 14px;
            line-height: 1.4;
            font-size: 15px;
        }

        .bot {
            background-color: #334155;
            align-self: flex-start;
        }

        .user {
            background-color: #2563eb;
            align-self: flex-end;
        }

        .chat-input {
            padding: 15px;
            background-color: #111827;
            border-top: 1px solid #334155;
        }

        .chat-input form {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        .chat-input button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background-color: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .chat-input button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            Mini Chatbot
        </div>

        <div class="chat-messages">
            <div class="message bot">Hey, I’m your chatbot.</div>

            {% if user_message %}
                <div class="message user">{{ user_message }}</div>
            {% endif %}

            {% if bot_response %}
                <div class="message bot">{{ bot_response }}</div>
            {% endif %}
        </div>

        <div class="chat-input">
            <form action="/submit" method="POST">
                <input type="text" name="message" placeholder="Type a message...">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

</body>
</html>
